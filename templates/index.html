<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Price Estimator</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #16213a;
    --panel-border: #253258;
    --text: #e6ebf5;
    --muted: #8b96b3;
    --accent: #4fd1c5;
    --accent-dim: #1f4b47;
    --price: #f5b969;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at 20% -10%, #1a2747 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .panel {
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 32px;
  }
  .eyebrow {
    font-family: 'Courier New', monospace;
    color: var(--accent);
    letter-spacing: 3px;
    font-size: 12px;
    text-transform: uppercase;
  }
  h1 { font-size: 26px; margin: 8px 0 24px; font-weight: 700; }

  form { display: flex; flex-direction: column; gap: 16px; }
  label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
  }
  input[type="number"] {
    width: 100%;
    padding: 11px 12px;
    background: #0d1730;
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
  }
  input[type="number"]:focus { outline: none; border-color: var(--accent); }

  button {
    margin-top: 4px;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #0b2320;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
  }
  button:hover { background: #64e0d5; }

  .result {
    margin-top: 20px;
    padding: 18px;
    border-radius: 10px;
    background: var(--accent-dim);
    border: 1px solid #2e6b64;
    font-size: 20px;
    font-weight: 700;
    color: var(--price);
    text-align: center;
    font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">ML Model · Live Prediction</div>
    <h1>House Price Estimator</h1>

    <form action="/predict" method="POST">
      <div>
        <label for="size_sqft">Size (sqft)</label>
        <input type="number" id="size_sqft" name="size_sqft" placeholder="e.g. 2200" step="any" required>
      </div>
      <div>
        <label for="bedrooms">Bedrooms</label>
        <input type="number" id="bedrooms" name="bedrooms" placeholder="e.g. 4" step="any" required>
      </div>
      <div>
        <label for="location_rating">Location Rating (1-6)</label>
        <input type="number" id="location_rating" name="location_rating" placeholder="e.g. 4" step="any" required>
      </div>
      <button type="submit">Predict Price</button>
    </form>

    {% if prediction_text %}
    <div class="result">{{ prediction_text }}</div>
    {% endif %}
  </div>
</body>
</html>
